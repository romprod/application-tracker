name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Check job-email agent skill impact
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          node scripts/check-job-email-skill-impact.mjs
          --base "$BASE_SHA"
          --head "$HEAD_SHA"
          --event-file "$GITHUB_EVENT_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate container configuration
        run: |
          cp .env.example .env
          docker compose -f deploy/compose.yml config --quiet
          docker build --tag application-tracker:ci .

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser acceptance
        run: npm run test:e2e:ci

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
